{% extends 'base.html' %}
{% block title %}Set New Password | {{ APP_NAME }}{% endblock %}
{% block content %}
<section class="auth-shell auth-shell-setpass">
  <div class="auth-glow auth-glow-a"></div>
  <div class="auth-glow auth-glow-c"></div>
  <div class="row justify-content-center">
    <div class="col-xl-6 col-lg-8">
      <div class="auth-card-premium auth-appear auth-delay-2">
        <span class="eyebrow">Set New Password</span>
        <h1 class="auth-form-title">Create a strong password</h1>
        <p class="auth-form-copy">
          Use at least 8 characters. Mix letters, numbers, and symbols for better security.
        </p>
        <form method="post" class="vstack gap-3 mt-3">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div>
            <label class="form-label auth-label">New password</label>
            <input
              class="form-control"
              type="password"
              name="password"
              minlength="8"
              placeholder="Enter new password"
              autocomplete="new-password"
              required
            >
          </div>
          <button class="btn btn-primary auth-btn-lg">Update password</button>
        </form>
        <div class="auth-link-row mt-4">
          <a href="{{ url_for('auth.login') }}">Back to login</a>
          <a href="{{ url_for('auth.signup') }}">Create account</a>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
