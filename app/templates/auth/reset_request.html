{% extends 'base.html' %}
{% block title %}Reset Password | {{ APP_NAME }}{% endblock %}
{% block content %}
<section class="row justify-content-center">
  <div class="col-lg-5">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <h1 class="h3 mb-3">Password reset</h1>
        <form method="post" class="vstack gap-3">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div>
            <label class="form-label">Email</label>
            <input class="form-control" type="email" name="email" required>
          </div>
          <button class="btn btn-primary">Generate reset link</button>
        </form>
        {% if token %}
        <div class="alert alert-info mt-4">
          Reset link:
          <a href="{{ url_for('auth.reset_password', token=token.token) }}">{{ url_for('auth.reset_password', token=token.token, _external=True) }}</a>
        </div>
        {% endif %}
      </div>
    </div>
  </div>
</section>
{% endblock %}
