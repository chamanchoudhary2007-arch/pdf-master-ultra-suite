<div class="card border-0 shadow-sm">
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <div>
        <div class="small text-muted">{{ job.tool_key }}</div>
        <h4 class="h6 mb-0">{{ job.created_at.strftime('%d %b %Y %H:%M') if job.created_at else 'Processing' }}</h4>
      </div>
      <span class="badge text-bg-{{ 'success' if job.status == 'completed' else 'danger' if job.status == 'failed' else 'warning' if job.status == 'processing' else 'secondary' }}">
        {{ job.status }}
      </span>
    </div>
    <div class="progress" role="progressbar">
      <div class="progress-bar" style="width: {{ job.progress }}%">{{ job.progress }}%</div>
    </div>
    {% if job.error_message %}
    <div class="small text-danger mt-2">{{ job.error_message }}</div>
    {% endif %}
  </div>
</div>
