{% extends 'tool_pages/tool_shell.html' %}
{% block tool_form %}
<h2 class="h4 mb-3">Smart PDF Pipeline</h2>
<p class="text-secondary">Run multiple operations in one pass: rotate, watermark, page numbers, compress, protect, and text extraction.</p>
<form method="post" action="{{ url_for('tools.run_tool', tool_key=tool.tool_key) }}" enctype="multipart/form-data" class="row g-3">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="col-12"><input class="form-control" type="file" name="document" accept=".pdf" required></div>
  <div class="col-md-4">
    <label class="form-label">Rotate angle</label>
    <select class="form-select" name="rotate_angle">
      <option value="0">No rotation</option>
      <option value="90">90</option>
      <option value="180">180</option>
      <option value="270">270</option>
    </select>
  </div>
  <div class="col-md-4">
    <label class="form-label">Compression</label>
    <select class="form-select" name="compress_level">
      <option value="none">None</option>
      <option value="low">Low</option>
      <option value="balanced" selected>Balanced</option>
      <option value="strong">Strong</option>
    </select>
  </div>
  <div class="col-md-4">
    <label class="form-label">Watermark position</label>
    <select class="form-select" name="watermark_position">
      <option value="diagonal">Diagonal</option>
      <option value="center">Center</option>
      <option value="top_left">Top left</option>
      <option value="top_right">Top right</option>
      <option value="bottom_left">Bottom left</option>
      <option value="bottom_center">Bottom center</option>
    </select>
  </div>
  <div class="col-md-8">
    <label class="form-label">Watermark text</label>
    <input class="form-control" type="text" name="watermark_text" placeholder="CONFIDENTIAL / INTERNAL USE">
  </div>
  <div class="col-md-4">
    <label class="form-label">Protection password</label>
    <input class="form-control" type="password" name="protect_password" placeholder="Optional">
  </div>
  <div class="col-md-6">
    <div class="form-check mt-2">
      <input class="form-check-input" type="checkbox" name="add_page_numbers" id="add_page_numbers" value="1">
      <label class="form-check-label" for="add_page_numbers">Add page numbers</label>
    </div>
  </div>
  <div class="col-md-6">
    <div class="form-check mt-2">
      <input class="form-check-input" type="checkbox" name="include_text_extract" id="include_text_extract" value="1">
      <label class="form-check-label" for="include_text_extract">Include text extraction</label>
    </div>
  </div>
  <div class="col-12"><button class="btn btn-primary">Run smart pipeline</button></div>
</form>
{% endblock %}
