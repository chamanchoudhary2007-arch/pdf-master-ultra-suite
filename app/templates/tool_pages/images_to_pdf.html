{% extends 'tool_pages/tool_shell.html' %}
{% block tool_form %}
<h2 class="h4 mb-3">Convert images to PDF</h2>
<form method="post" action="{{ url_for('tools.run_tool', tool_key=tool.tool_key) }}" enctype="multipart/form-data" class="vstack gap-3">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <input class="form-control" type="file" name="images" accept=".png,.jpg,.jpeg,.webp,.bmp,.tiff" multiple required>
  <button class="btn btn-primary">Create PDF</button>
</form>
{% endblock %}
