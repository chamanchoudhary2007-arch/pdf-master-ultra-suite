{% extends 'tool_pages/tool_shell.html' %}
{% block tool_form %}
<h2 class="h4 mb-3">Delete pages</h2>
<form method="post" action="{{ url_for('tools.run_tool', tool_key=tool.tool_key) }}" enctype="multipart/form-data" class="vstack gap-3">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <input class="form-control" type="file" name="document" accept=".pdf" required>
  <input class="form-control" type="text" name="pages" placeholder="Pages to remove: 2,4-6" required>
  <button class="btn btn-primary">Remove pages</button>
</form>
{% endblock %}
