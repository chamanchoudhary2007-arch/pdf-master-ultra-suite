{% extends 'base.html' %}
{% block title %}Shared File | {{ APP_NAME }}{% endblock %}
{% block content %}
<section class="row justify-content-center">
  <div class="col-lg-5">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <span class="eyebrow">Secure share</span>
        <h1 class="h3 mb-3">Access shared file</h1>
        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        <p class="text-secondary">If the link is password-protected, enter the password to download the file.</p>
        <form method="post" class="vstack gap-3">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div>
            <label class="form-label">Share password</label>
            <input class="form-control" type="password" name="password" placeholder="Enter password if required">
          </div>
          <button class="btn btn-primary">Download file</button>
        </form>
      </div>
    </div>
  </div>
</section>
{% endblock %}
