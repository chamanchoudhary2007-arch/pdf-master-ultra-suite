<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login | PDF Master Ultra Suite</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top right, rgba(34, 197, 94, 0.18), transparent 32%),
        radial-gradient(circle at bottom left, rgba(59, 130, 246, 0.16), transparent 34%),
        #0b1220;
      color: #e5e7eb;
    }
    .admin-login-card {
      background: rgba(15, 23, 42, 0.88);
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 1rem;
      box-shadow: 0 24px 44px rgba(0, 0, 0, 0.42);
    }
    .brand-pill {
      display: inline-flex;
      padding: 0.3rem 0.75rem;
      border-radius: 999px;
      background: rgba(16, 185, 129, 0.18);
      color: #6ee7b7;
      font-size: 0.76rem;
      letter-spacing: 0.08em;
      font-weight: 700;
      text-transform: uppercase;
    }
    .form-control {
      background: rgba(15, 23, 42, 0.65);
      border-color: rgba(148, 163, 184, 0.32);
      color: #f8fafc;
    }
    .form-control:focus {
      background: rgba(15, 23, 42, 0.72);
      color: #fff;
      border-color: rgba(52, 211, 153, 0.8);
      box-shadow: 0 0 0 0.2rem rgba(16, 185, 129, 0.16);
    }
  </style>
</head>
<body>
  <main class="container py-5">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
      <div class="mb-4">
        {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
      </div>
      {% endif %}
    {% endwith %}
    <div class="row justify-content-center">
      <div class="col-md-7 col-lg-5">
        <div class="admin-login-card p-4 p-lg-5">
          <span class="brand-pill mb-3">PDF Master Ultra Suite</span>
          <h1 class="h3 mb-2">Admin Panel Login</h1>
          <p class="text-secondary mb-4">Authorized admin emails can sign in with account password.</p>
          <form method="post" class="vstack gap-3">
            <input type="hidden" name="next" value="{{ next_url }}">
            <div>
              <label class="form-label">Admin Email</label>
              <input class="form-control" type="email" name="email" required>
            </div>
            <div>
              <label class="form-label">Password</label>
              <input class="form-control" type="password" name="password" required>
            </div>
            <button class="btn btn-success w-100" type="submit">Sign in to Admin Panel</button>
          </form>
        </div>
      </div>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
